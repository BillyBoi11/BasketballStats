<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CourtSide Pro | Tactical Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; touch-action: manipulation; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        
        /* Team Accents */
        .team-1-accent { border-top: 8px solid #3b82f6 !important; }
        .team-2-accent { border-top: 8px solid #f43f5e !important; }
        .team-3-accent { border-top: 8px solid #fbbf24 !important; }
        .team-4-accent { border-top: 8px solid #a855f7 !important; }
        .team-none-accent { border-top: 8px solid #64748b !important; }

        /* THE STAT POD */
        .stat-pod { 
            @apply flex flex-col bg-slate-900/60 rounded-[2.5rem] border border-white/5 p-5 gap-4 shadow-2xl;
        }
        .pod-display { @apply flex justify-center items-center px-2 border-b border-white/5 pb-3 gap-2; }
        .pod-label { @apply text-[14px] font-black text-indigo-300 uppercase tracking-widest; }
        .pod-value { @apply font-mono text-3xl font-black text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]; }
        
        .button-row { @apply flex gap-3; }

        /* TACTILE BUTTON STYLING */
        .btn-base {
            @apply flex-1 flex items-center justify-center py-6 rounded-2xl font-black text-xs uppercase tracking-[0.2em] transition-all active:translate-y-1 active:shadow-none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .btn-add { 
            @apply btn-base text-white;
            background: linear-gradient(180deg, #10b981 0%, #059669 100%);
            box-shadow: 0 5px 0 #064e3b, 0 8px 20px rgba(16, 185, 129, 0.2);
            border: 1px solid #34d399;
        }
        .btn-add:active { box-shadow: 0 1px 0 #064e3b; }

        .btn-remove { 
            @apply btn-base text-slate-400;
            background: linear-gradient(180deg, #334155 0%, #1e293b 100%);
            box-shadow: 0 5px 0 #0f172a, 0 8px 15px rgba(0,0,0,0.3);
            border: 1px solid #475569;
        }
        .btn-remove:active { box-shadow: 0 1px 0 #0f172a; }

        .input-field { 
            background: #0f172a !important; 
            border: 1px solid #1e293b !important; 
            color: #ffffff !important; 
            @apply rounded-3xl p-6 font-black outline-none w-full focus:border-indigo-500 text-2xl shadow-inner;
        }
    </style>
</head>
<body class="p-6 md:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-6xl font-black italic bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent uppercase tracking-tighter">Pro Recorder</h1>
                <p class="text-slate-500 font-bold text-xs uppercase tracking-[0.5em] mt-2">Precision Tablet Interface</p>
            </div>
            <div class="flex gap-4 w-full md:w-auto">
                <button onclick="clearCurrentGame()" class="flex-1 bg-slate-900 text-slate-500 px-8 py-5 rounded-3xl font-black text-xs uppercase tracking-widest border border-white/10">Reset Stats</button>
                <button onclick="openSaveModal()" class="flex-1 bg-emerald-600 text-white px-10 py-5 rounded-3xl font-black text-xs uppercase tracking-widest shadow-2xl shadow-emerald-500/20 active:scale-95 transition-all">Finish & Save</button>
            </div>
        </header>

        <div class="glass p-8 rounded-[3.5rem] mb-16 flex flex-col md:flex-row gap-6">
            <input type="text" id="newPlayerName" class="input-field" placeholder="Enter Athlete Name..." onkeydown="if(event.key==='Enter') addPlayer()">
            <button onclick="addPlayer()" class="bg-indigo-600 px-16 h-[84px] rounded-[2rem] font-black text-5xl text-white shadow-xl shadow-indigo-500/30 active:translate-y-1">+</button>
        </div>

        <div id="recording-grid" class="space-y-24 mb-40"></div>

        <div class="flex items-center gap-6 mb-12">
            <div class="h-[1px] bg-slate-800 flex-grow"></div>
            <h3 class="text-sm font-black text-indigo-500 uppercase tracking-[0.5em]">Game Archives</h3>
            <div class="h-[1px] bg-slate-800 flex-grow"></div>
        </div>
        <div id="local-archives-container" class="space-y-12 pb-40"></div>
    </div>

    <div id="save-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-8 z-50">
        <div class="glass p-12 rounded-[4rem] w-full max-w-xl border-t-8 border-emerald-500">
            <h3 class="text-4xl font-black italic uppercase tracking-tighter mb-8 text-center">Save Session</h3>
            <div class="space-y-6">
                <input type="text" id="modalGameName" class="input-field" placeholder="Session Name">
                <input type="text" id="modalDuration" class="input-field" placeholder="Duration (min:hrs)">
                <div class="flex gap-4 pt-6">
                    <button onclick="closeSaveModal()" class="flex-1 bg-slate-800 py-6 rounded-3xl font-black uppercase text-xs tracking-widest text-slate-400">Back</button>
                    <button onclick="confirmSave()" class="flex-1 bg-emerald-600 py-6 rounded-3xl font-black uppercase text-xs tracking-widest text-white shadow-xl shadow-emerald-500/20">Commit</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPlayers = JSON.parse(localStorage.getItem('cs_current_players')) || [];
        let localHistory = JSON.parse(localStorage.getItem('cs_local_history')) || [];

        // Exact names requested
        const STAT_MAP = [
            { id: 'threeP', label: '3PT' },
            { id: 'twoP', label: '2PT' },
            { id: 'ft', label: 'Freethrows' },
            { id: 'reb', label: 'Rebounds' },
            { id: 'stl', label: 'Steals' },
            { id: 'blk', label: 'Blocks' },
            { id: 'foul', label: 'Fouls' },
            { id: 'miss', label: 'Miss' }
        ];

        window.onload = () => { renderPlayers(); renderHistory(); };
        function autoSave() { localStorage.setItem('cs_current_players', JSON.stringify(currentPlayers)); }

        function addPlayer() {
            const input = document.getElementById('newPlayerName');
            if (!input.value.trim()) return;
            currentPlayers.push({ name: input.value.trim(), team: "Team 1", twoP: 0, threeP: 0, ft: 0, reb: 0, blk: 0, stl: 0, foul: 0, miss: 0 });
            input.value = ''; autoSave(); renderPlayers();
        }

        function updateStat(pIdx, stat, amt) {
            currentPlayers[pIdx][stat] = Math.max(0, currentPlayers[pIdx][stat] + amt);
            autoSave(); renderPlayers();
        }

        function updateTeam(pIdx, team) {
            currentPlayers[pIdx].team = team;
            autoSave(); renderPlayers();
        }

        function renderPlayers() {
            const grid = document.getElementById('recording-grid');
            grid.innerHTML = currentPlayers.map((p, i) => {
                const teamKey = p.team.toLowerCase().replace(' ', '-');
                return `
                <div class="glass p-10 rounded-[4.5rem] ${teamKey}-accent shadow-2xl">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-10 px-6 gap-8">
                        <div class="text-center md:text-left">
                            <h4 class="font-black text-6xl italic uppercase tracking-tighter leading-none text-white">${p.name}</h4>
                            <p class="text-indigo-400 font-black text-sm uppercase tracking-[0.4em] mt-4">Stat Entry Active</p>
                        </div>
                        <div class="flex gap-4">
                            <select onchange="updateTeam(${i}, this.value)" class="bg-slate-900 text-white text-xs font-black px-8 py-5 rounded-2xl border border-white/10 outline-none">
                                <option value="Team 1" ${p.team === 'Team 1' ? 'selected' : ''}>TEAM 1</option>
                                <option value="Team 2" ${p.team === 'Team 2' ? 'selected' : ''}>TEAM 2</option>
                                <option value="Team 3" ${p.team === 'Team 3' ? 'selected' : ''}>TEAM 3</option>
                                <option value="Team 4" ${p.team === 'Team 4' ? 'selected' : ''}>TEAM 4</option>
                                <option value="None" ${p.team === 'None' ? 'selected' : ''}>NO TEAM</option>
                            </select>
                            <button onclick="if(confirm('Delete Athlete?')) {currentPlayers.splice(${i},1); autoSave(); renderPlayers();}" class="bg-rose-500/10 text-rose-500 px-8 rounded-2xl font-black text-3xl">×</button>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        ${STAT_MAP.map(stat => `
                            <div class="stat-pod">
                                <div class="pod-display">
                                    <span class="pod-label">${stat.label} :</span>
                                    <span class="pod-value">${p[stat.id]}</span>
                                </div>
                                <div class="button-row">
                                    <button onclick="updateStat(${i},'${stat.id}',1)" class="btn-add">ADD</button>
                                    <button onclick="updateStat(${i},'${stat.id}',-1)" class="btn-remove">REMOVE</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        function openSaveModal() { if(currentPlayers.length > 0) document.getElementById('save-modal').classList.remove('hidden'); }
        function closeSaveModal() { document.getElementById('save-modal').classList.add('hidden'); }

        function confirmSave() {
            const name = document.getElementById('modalGameName').value.trim() || "Manual Session";
            const duration = document.getElementById('modalDuration').value.trim() || "15";
            localHistory.unshift({
                date: new Date().toLocaleDateString('en-GB'),
                gameName: name,
                duration: duration,
                players: JSON.parse(JSON.stringify(currentPlayers))
            });
            localStorage.setItem('cs_local_history', JSON.stringify(localHistory));
            closeSaveModal(); renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('local-archives-container');
            container.innerHTML = localHistory.map((game, idx) => `
                <div class="glass rounded-[3.5rem] overflow-hidden border border-white/5">
                    <div class="bg-slate-900/60 p-10 border-b border-white/5 flex flex-col md:flex-row justify-between items-center gap-8">
                        <div>
                            <span class="bg-indigo-600 text-[10px] font-black px-3 py-1 rounded-lg uppercase tracking-widest text-white">${game.date}</span>
                            <h2 class="text-4xl font-black italic text-white uppercase tracking-tighter mt-3">${game.gameName}</h2>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="copyGameCode(${idx})" class="bg-indigo-600 text-white px-8 py-4 rounded-3xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-indigo-500/20">Code</button>
                            <button onclick="deleteHistoryItem(${idx})" class="bg-slate-800 text-rose-500 px-6 py-4 rounded-3xl font-black text-[10px] uppercase">Delete</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-black/20 text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-white/5">
                                <tr>
                                    <th class="p-8">Athlete</th>
                                    <th class="p-4 text-white">Points</th>
                                    <th class="p-4">2PT</th><th class="p-4">3PT</th><th class="p-4">FT</th>
                                    <th class="p-4 text-emerald-400">REB</th><th class="p-4 text-emerald-400">STL</th><th class="p-4 text-emerald-400">BLK</th>
                                    <th class="p-4 text-rose-400">FOUL</th><th class="p-4 text-rose-400">MISS</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/5">
                                ${game.players.map(p => {
                                    const pts = (parseInt(p.twoP)*2) + (parseInt(p.threeP)*3) + parseInt(p.ft);
                                    return `
                                    <tr class="hover:bg-white/5 transition-colors">
                                        <td class="p-8 font-black italic text-xl text-white uppercase">${p.name}</td>
                                        <td class="p-4 font-mono font-black text-2xl text-indigo-400">${pts}</td>
                                        <td class="p-4 font-mono font-bold text-slate-400">${p.twoP}</td>
                                        <td class="p-4 font-mono font-bold text-slate-400">${p.threeP}</td>
                                        <td class="p-4 font-mono font-bold text-slate-400">${p.ft}</td>
                                        <td class="p-4 font-mono font-bold text-emerald-500">${p.reb}</td>
                                        <td class="p-4 font-mono font-bold text-emerald-500">${p.stl}</td>
                                        <td class="p-4 font-mono font-bold text-emerald-500">${p.blk}</td>
                                        <td class="p-4 font-mono font-bold text-rose-500">${p.foul}</td>
                                        <td class="p-4 font-mono font-bold text-rose-500">${p.miss}</td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`).join('');
        }

        function copyGameCode(idx) {
            const data = JSON.stringify(localHistory[idx], null, 4) + ",";
            navigator.clipboard.writeText(data);
            alert("Code copied!");
        }

        function deleteHistoryItem(idx) {
            if(confirm("Permanently delete?")) {
                localHistory.splice(idx, 1);
                localStorage.setItem('cs_local_history', JSON.stringify(localHistory));
                renderHistory();
            }
        }

        function clearCurrentGame() {
            if(confirm("Reset all live stats?")) {
                currentPlayers.forEach(p => { STAT_MAP.forEach(s => p[s.id] = 0); });
                autoSave(); renderPlayers();
            }
        }
    </script>
</body>
</html>
